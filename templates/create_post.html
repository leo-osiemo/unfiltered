{% extends "./base.html" %}
{% block styles %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<style>
    body {
        background-color: #1A1A1A;
        font-family: 'Inter', sans-serif;
    }

    .create-wrapper {
        max-width: 620px;
        margin: 60px auto;
        padding: 0 1rem;
    }

    .create-wrapper h2 {
        text-align: center;
        font-size: 22px;
        font-weight: 500;
        color: #F1EFE8;
        margin-bottom: 2rem;
        letter-spacing: 0.01em;
    }

    .field-label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: #888780;
        margin-bottom: 8px;
    }

    .field-hint {
        font-size: 11px;
        color: #5F5E5A;
        margin-top: 5px;
    }

    .field-divider {
        height: 0.5px;
        background: #444441;
        margin: 1.5rem 0;
    }

    #title-input,
    #description-input {
        width: 100%;
        background-color: #2C2C2A;
        border: 0.5px solid #444441;
        border-radius: 8px;
        color: #F1EFE8;
        font-family: 'Inter', sans-serif;
        padding: 10px 14px;
        resize: none;
        overflow: hidden;
        line-height: 1.4;
        box-sizing: border-box;
        transition: border-color 0.2s;
    }

    #title-input {
        font-size: 20px;
        font-weight: 500;
        min-height: 48px;
    }

    #description-input {
        font-size: 14px;
        min-height: 72px;
    }

    #title-input:focus,
    #description-input:focus {
        outline: none;
        border-color: #D85A30;
    }

    #title-input::placeholder,
    #description-input::placeholder {
        color: #5F5E5A;
    }

    .ql-toolbar {
        background-color: #2C2C2A;
        border: 0.5px solid #444441 !important;
        border-radius: 8px 8px 0 0;
    }

    .ql-toolbar .ql-stroke {
        stroke: #888780;
    }

    .ql-toolbar .ql-fill {
        fill: #888780;
    }

    .ql-toolbar .ql-picker {
        color: #888780;
    }

    .ql-toolbar button:hover .ql-stroke,
    .ql-toolbar button.ql-active .ql-stroke {
        stroke: #F0997B;
    }

    .ql-toolbar button:hover .ql-fill,
    .ql-toolbar button.ql-active .ql-fill {
        fill: #F0997B;
    }

    .ql-container {
        background-color: #2C2C2A;
        border: 0.5px solid #444441 !important;
        border-top: none !important;
        border-radius: 0 0 8px 8px;
        color: #F1EFE8;
        font-family: 'Inter', sans-serif;
        font-size: 15px;
        line-height: 1.7;
    }

    .ql-editor {
        min-height: 280px;
        padding: 14px;
    }

    .ql-editor.ql-blank::before {
        color: #5F5E5A;
        font-style: normal;
    }

    .ql-container:focus-within {
        border-color: #D85A30 !important;
    }

    .publish-btn {
        display: block;
        width: 100%;
        margin-top: 1.5rem;
        padding: 12px;
        background-color: #D85A30;
        color: #F1EFE8;
        border: none;
        border-radius: 8px;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s;
    }

    .publish-btn:hover {
        background-color: #F0997B;
    }
    .tags-input-wrapper {
        background-color: #2C2C2A;
        border: 0.5px solid #444441;
        border-radius: 8px;
        padding: 8px 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
        transition: border-color 0.2s;
        cursor: text;
    }
    .tags-input-wrapper:focus-within {
        border-color: #D85A30;
    }
    #tags-display {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
    }
    .tag-pill {
        background-color: #FAECE7;
        color: #993C1D;
        font-size: 12px;
        font-weight: 500;
        padding: 3px 10px;
        border-radius: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
    }
    .tag-pill:hover {
        background-color: #F0997B;
        color: #1A1A1A;
    }
    .tag-pill .remove {
        font-size: 14px;
        line-height: 1;
    }
    #tag-input {
        background: transparent;
        border: none;
        outline: none;
        color: #F1EFE8;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        min-width: 160px;
        padding: 2px 0;
    }
    #tag-input::placeholder {
        color: #5F5E5A;
    }
</style>
{% endblock %}

{% block content %}
<div class="create-wrapper">
    <h2>New post</h2>
    <form method="POST">
        {{ form.hidden_tag() }}

        <div class="mb-3">
            <label class="field-label">Title</label>
            <textarea id="title-input" name="title" rows="1"
                placeholder="What's on your mind...">{{ form.title.data or '' }}</textarea>
        </div>

        <div class="field-divider"></div>

        <div class="mb-3">
            <label class="field-label">Description</label>
            <textarea id="description-input" name="description" rows="2"
                placeholder="A short teaser — one or two sentences...">{{ form.description.data or '' }}</textarea>
            <p class="field-hint">This shows on the post card on the homepage.</p>
        </div>
        <div class="mb-3">
            <label class="field-label">Tags</label>
            <div class="tags-input-wrapper" id="tags-wrapper">
                <div id="tags-display"></div>
                <input type="text" id="tag-input" placeholder="Type a word and press Enter..." maxlength="20" />
            </div>
            <p class="field-hint">One word per tag. Press Enter to add, click a tag to remove it.</p>
            <input type="hidden" name="tags" id="tags-hidden">
        </div>

        <div class="field-divider"></div>
        <div class="field-divider"></div>

        <div class="mb-3">
            <label class="field-label">Content</label>
            <div id="editor"></div>
            <input type="hidden" name="content" id="content-hidden">
        </div>

        <button type="submit" class="publish-btn">Publish</button>
    </form>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<script>
    function autoGrow(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    const titleInput = document.getElementById('title-input');
    const descInput = document.getElementById('description-input');

    titleInput.addEventListener('input', function () { autoGrow(this); });
    descInput.addEventListener('input', function () { autoGrow(this); });

    var quill = new Quill('#editor', {
        theme: 'snow',
        placeholder: 'Write something worth reading...',
        modules: {
            toolbar: [
                ['bold', 'italic', 'underline'],
                [{ 'align': [] }],
                [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                ['clean']
            ]
        }
    });

    quill.on('text-change', function () {
        const editor = document.querySelector('.ql-editor');
        editor.style.height = 'auto';
        editor.style.height = editor.scrollHeight + 'px';
    });

    document.querySelector('form').addEventListener('submit', function () {
        document.getElementById('content-hidden').value = quill.root.innerHTML;
    });
    const tagInput = document.getElementById('tag-input');
    const tagsDisplay = document.getElementById('tags-display');
    const tagsHidden = document.getElementById('tags-hidden');
    const tagsWrapper = document.getElementById('tags-wrapper');
    let tags = [];

    tagsWrapper.addEventListener('click', function () {
        tagInput.focus();
    });

    tagInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            let word = tagInput.value.trim().replace(/\s+/g, '');
            if (word && !tags.includes(word) && tags.length < 5) {
                tags.push(word);
                renderTags();
                tagInput.value = '';
            }
        }
        // stop spacebar — forces one word only
        if (e.key === ' ') {
            e.preventDefault();
        }
    });

    function renderTags() {
        tagsDisplay.innerHTML = '';
        tags.forEach(function (tag) {
            const pill = document.createElement('span');
            pill.className = 'tag-pill';
            pill.innerHTML = tag + '<span class="remove">×</span>';
            pill.addEventListener('click', function () {
                tags = tags.filter(t => t !== tag);
                renderTags();
            });
            tagsDisplay.appendChild(pill);
        });
        tagsHidden.value = tags.join(',');
    }
</script>
{% endblock %}
